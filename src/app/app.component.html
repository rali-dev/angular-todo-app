<div class="container-fluid mx-auto">
  <div class="d-block py-4">
    <app-header
      class="header"
      [caption]="caption()"
      (onCaptionClick)="handleCaptionClick($event)"
    ></app-header>
  </div>
  <input
    class="px-4 py-2"
    placeholder="enter your name..."
    [(ngModel)]="name"
  />
  <h1 class="text-primary py-2" [id]="id()" [attr.data-name]="name()">
    Hello, {{ name() }}
  </h1>
  <div class="d-block mb-4">
     <button
       class="d-block btn btn-primary rounded"
       (click)="handleClick()"
       (mouseenter)="handleMouseEnter($event)"
     >
    Say Hello ...
  </button>
  </div>

     <div class="d-block">
       <pre>{{ user() | json }}</pre>
    </div>
    <div class="d-block">
       <button class="d-block btn btn-secondary rounded" (click)="handleSetUserData()">Set User Data</button>
    </div>


</div>
